<svg xmlns="http://www.w3.org/2000/svg" width="800" height="131.429" viewBox="0 0 1400 230" role="img" aria-labelledby="title desc">
  <title id="title">Industrial water anomaly detection pipeline</title>
  <desc id="desc">Sensor data moves through feature engineering, channel models, a decision engine, and a predictive warning.</desc>
  <defs>
    <style>
      .mono { font-family: "SFMono-Regular", "Cascadia Code", monospace; }
      .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect x="1" y="1" width="1398" height="228" rx="18" fill="#F8F6F1" stroke="#D7D1C6"/>
  <text x="45" y="43" class="mono" font-size="13" fill="#746F66" letter-spacing="1.9">SYSTEM FLOW / CURRENT R&amp;D</text>

  <g transform="translate(44 76)">
    <g>
      <rect width="220" height="102" rx="12" fill="#F4F1EA" stroke="#D7D1C6"/>
      <text x="18" y="26" class="mono" font-size="11" fill="#7D6C5D">01</text>
      <text x="18" y="57" class="mono" font-size="14" fill="#191815">SENSOR STREAM</text>
      <text x="18" y="80" class="sans" font-size="13" fill="#746F66">30-second readings</text>
    </g>
    <g transform="translate(262)">
      <rect width="220" height="102" rx="12" fill="#F4F1EA" stroke="#D7D1C6"/>
      <text x="18" y="26" class="mono" font-size="11" fill="#7D6C5D">02</text>
      <text x="18" y="57" class="mono" font-size="14" fill="#191815">FEATURES</text>
      <text x="18" y="80" class="sans" font-size="13" fill="#746F66">lags · slopes · windows</text>
    </g>
    <g transform="translate(524)">
      <rect width="220" height="102" rx="12" fill="#F4F1EA" stroke="#D7D1C6"/>
      <text x="18" y="26" class="mono" font-size="11" fill="#7D6C5D">03</text>
      <text x="18" y="57" class="mono" font-size="14" fill="#191815">CHANNEL MODELS</text>
      <text x="18" y="80" class="sans" font-size="13" fill="#746F66">ML + rule fallback</text>
    </g>
    <g transform="translate(786)">
      <rect width="220" height="102" rx="12" fill="#F4F1EA" stroke="#D7D1C6"/>
      <text x="18" y="26" class="mono" font-size="11" fill="#7D6C5D">04</text>
      <text x="18" y="57" class="mono" font-size="14" fill="#191815">DECISION ENGINE</text>
      <text x="18" y="80" class="sans" font-size="13" fill="#746F66">risk aggregation</text>
    </g>
    <g transform="translate(1048)">
      <rect width="220" height="102" rx="12" fill="#1B1A18"/>
      <text x="18" y="26" class="mono" font-size="11" fill="#BDAA98">05</text>
      <text x="18" y="57" class="mono" font-size="14" fill="#F8F6F1">EARLY WARNING</text>
      <text x="18" y="80" class="sans" font-size="13" fill="#BDB6AC">time-to-alarm</text>
    </g>

    <g stroke="#7D6C5D" fill="none">

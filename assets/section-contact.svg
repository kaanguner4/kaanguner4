<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="120" viewBox="0 0 1400 120" role="img" aria-labelledby="t d">
  <title id="t">CONTACT section</title>
  <desc id="d">Neon section header for the CONTACT section.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FBBF24"/><stop offset="1" stop-color="#FBBF24" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>
  <rect width="1400" height="120" rx="18" fill="#0B0F1A"/>
  <rect width="1400" height="120" rx="18" fill="url(#g)" opacity="0.10"/>
  <rect x="0" y="0" width="6" height="120" rx="3" fill="#FBBF24" filter="url(#glow)"/>
  <text x="44" y="52" class="mono" font-size="15" letter-spacing="4" fill="#FCD34D" opacity="0.85">/ 05</text>
  <text x="44" y="94" class="disp" font-size="44" fill="#ECFEFF">CONTACT</text>
  <text x="259" y="92" class="mono" font-size="16" fill="#64748B">say hi, i reply fast</text>
  <g opacity="0.9">
    <circle cx="1330" cy="60" r="5" fill="#FBBF24"><animate attributeName="opacity" values="1;0.15;1" dur="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="1352" cy="60" r="5" fill="#FBBF24" opacity="0.5"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.8s" begin="0.3s" repeatCount="indefinite"/></circle>
    <rect x="1150" y="56" width="140" height="8" rx="4" fill="#111827"/>
    <rect x="1150" y="56" width="40" height="8" rx="4" fill="#FBBF24">
      <animate attributeName="x" values="1150;1250;1150" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
  <rect x="1" y="1" width="1398" height="118" rx="18" fill="none" stroke="#1E293B"/>
</svg>

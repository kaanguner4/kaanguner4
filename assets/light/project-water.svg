<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="280" viewBox="0 0 1400 280" role="img" aria-labelledby="t d">
  <title id="t">SaveCon Water Intelligence — featured end-to-end project</title>
  <desc id="d">An AI and analysis layer for IoT water devices, with six measurement models, rule-based critical detection, a FastAPI application, PostgreSQL, Redis, reports and notifications.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F0FDFA"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0284C7" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#047857" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0284C7"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#047857"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="34"/></filter>
    <clipPath id="clip"><rect width="1400" height="280" rx="20"/></clipPath>
    <style>
      .mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}
      .disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}
    </style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1400" height="280" fill="url(#bg)"/>
    <circle cx="1230" cy="30" r="150" fill="#0284C7" opacity="0.10" filter="url(#soft)"/>
    <rect width="5" height="280" fill="#0284C7"/>

    <rect x="40" y="28" width="266" height="29" rx="14.5" fill="#0284C7" fill-opacity="0.09" stroke="#0284C7" stroke-opacity="0.42"/>
    <text x="57" y="48" class="mono" font-size="11.5" letter-spacing="2.2" fill="#0369A1">FEATURED · AI + BACKEND</text>

    <text x="40" y="103" class="disp" font-size="35" fill="#0F172A">SaveCon Water Intelligence</text>
    <text x="40" y="139" class="mono" font-size="15.5" fill="#475569">An intelligence layer for IoT water devices: raw registers become</text>
    <text x="40" y="165" class="mono" font-size="15.5" fill="#475569">anomaly decisions, pre-alarms, reports and notifications.</text>

    <g class="mono" font-size="12.5">
      <rect x="40" y="186" width="72" height="29" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/><text x="51" y="205" fill="#334155">Python</text>
      <rect x="121" y="186" width="81" height="29" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/><text x="132" y="205" fill="#334155">FastAPI</text>
      <rect x="211" y="186" width="102" height="29" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/><text x="222" y="205" fill="#334155">Postgres</text>
      <rect x="322" y="186" width="65" height="29" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/><text x="333" y="205" fill="#334155">Redis</text>
      <rect x="396" y="186" width="75" height="29" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/><text x="407" y="205" fill="#334155">Docker</text>
    </g>

    <line x1="40" y1="235" x2="1360" y2="235" stroke="#CBD5E1"/>
    <text x="40" y="262" class="mono" font-size="13" fill="#0369A1">&gt; explore architecture, tests and handoff docs</text>
    <rect x="420" y="250" width="8" height="16" rx="1" fill="#0284C7">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <g transform="translate(810,31)">
      <text x="0" y="17" class="mono" font-size="11" letter-spacing="2.3" fill="#64748B">SYSTEM FLOW</text>
      <text x="540" y="17" text-anchor="end" class="mono" font-size="11" fill="#047857">6 MODEL WORKERS</text>
      <line x1="0" y1="33" x2="540" y2="33" stroke="#CBD5E1"/>

      <line x1="52" y1="107" x2="488" y2="107" stroke="url(#flow)" stroke-width="2" stroke-dasharray="7 7">
        <animate attributeName="stroke-dashoffset" values="28;0" dur="3s" repeatCount="indefinite"/>
      </line>
      <g class="mono">
        <rect x="0" y="69" width="112" height="76" rx="12" fill="#FFFFFF" stroke="#7DD3FC"/>
        <circle cx="26" cy="94" r="7" fill="#0284C7"/>
        <text x="42" y="98" font-size="11" fill="#0369A1">INGEST</text>
        <text x="16" y="124" font-size="11.5" fill="#334155">sensor data</text>

        <rect x="142" y="69" width="112" height="76" rx="12" fill="#FFFFFF" stroke="#BFDBFE"/>
        <circle cx="168" cy="94" r="7" fill="#0369A1"/>
        <text x="184" y="98" font-size="11" fill="#075985">MODELS</text>
        <text x="158" y="124" font-size="11.5" fill="#334155">per metric</text>

        <rect x="284" y="69" width="112" height="76" rx="12" fill="#FFFFFF" stroke="#DDD6FE"/>
        <circle cx="310" cy="94" r="7" fill="#7C3AED"/>
        <text x="326" y="98" font-size="11" fill="#6D28D9">DECIDE</text>
        <text x="300" y="124" font-size="11.5" fill="#334155">rules + ML</text>

        <rect x="426" y="69" width="112" height="76" rx="12" fill="#FFFFFF" stroke="#A7F3D0"/>
        <circle cx="452" cy="94" r="7" fill="#047857"/>
        <text x="468" y="98" font-size="11" fill="#047857">DELIVER</text>
        <text x="442" y="124" font-size="11.5" fill="#334155">API + alerts</text>
      </g>
      <g class="mono" font-size="11.5">
        <rect x="0" y="167" width="168" height="29" rx="8" fill="#F1F5F9" stroke="#BAE6FD"/>
        <text x="15" y="186" fill="#475569">reports + dashboard</text>
        <rect x="184" y="167" width="173" height="29" rx="8" fill="#F1F5F9" stroke="#BAE6FD"/>
        <text x="199" y="186" fill="#475569">PostgreSQL + Redis</text>
        <rect x="373" y="167" width="165" height="29" rx="8" fill="#F1F5F9" stroke="#BAE6FD"/>
        <text x="388" y="186" fill="#475569">one-command setup</text>
      </g>
    </g>
  </g>
  <rect x="1" y="1" width="1398" height="278" rx="20" fill="none" stroke="url(#edge)" stroke-width="1.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="700" height="356" viewBox="0 0 700 356" role="img" aria-labelledby="t d">
  <title id="t">Auto Care Hub</title>
  <desc id="d">A full-stack automotive service platform with smart booking, live status tracking and an admin workflow and analytics dashboard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#F1F5F9"/></linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#D97706" stop-opacity="0.55"/><stop offset="1" stop-color="#D97706" stop-opacity="0.10"/></linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="30"/></filter>
    <clipPath id="clip"><rect width="700" height="356" rx="20"/></clipPath>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="700" height="356" fill="url(#bg)"/>
    <circle cx="650" cy="20" r="120" fill="#D97706" opacity="0.14" filter="url(#soft)">
      <animate attributeName="opacity" values="0.14;0.07;0.14" dur="6s" repeatCount="indefinite"/>
    </circle>
    <rect x="0" y="0" width="5" height="356" fill="#D97706"><animate attributeName="opacity" values="0.9;0.4;0.9" dur="4s" repeatCount="indefinite"/></rect>

    <rect x="34" y="30" width="134" height="28" rx="14" fill="#D97706" fill-opacity="0.10" stroke="#D97706" stroke-opacity="0.4"/>
    <text x="50" y="49" class="mono" font-size="12" letter-spacing="3" fill="#92400E">FULL STACK</text>

    <text x="34" y="118" class="disp" font-size="37" fill="#0F172A">Auto</text>
    <text x="34" y="160" class="disp" font-size="37" fill="#0F172A">Care Hub</text>

    <text x="34" y="210" class="mono" font-size="15" fill="#475569">Smart booking, live service tracking and</text>
    <text x="34" y="236" class="mono" font-size="15" fill="#475569">an admin workflow + analytics dashboard.</text>

    <g class="mono" font-size="13.5"><rect x="34" y="262" width="82" height="30" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/><text x="45" y="281" fill="#334155">Node.js</text><rect x="125" y="262" width="82" height="30" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/><text x="136" y="281" fill="#334155">Express</text><rect x="216" y="262" width="65" height="30" rx="8" fill="#F1F5F9" stroke="#CBD5E1"/><text x="227" y="281" fill="#334155">MySQL</text></g>

    <line x1="34" y1="318" x2="666" y2="318" stroke="#CBD5E1"/>
    <text x="34" y="344" class="mono" font-size="13" fill="#92400E">&gt; open repository</text>
    <rect x="196" y="333" width="8" height="15" rx="1" fill="#D97706"><animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/></rect>
  </g>
  <rect x="1" y="1" width="698" height="354" rx="20" fill="none" stroke="url(#edge)" stroke-width="1.5"/>
</svg>

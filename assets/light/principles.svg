<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="130" viewBox="0 0 1400 130" role="img" aria-labelledby="t d">
  <title id="t">Working principles</title><desc id="d">The principles Kaan works by.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FAFC"/><stop offset="1" stop-color="#F1F5F9"/></linearGradient><style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style></defs>
  <rect width="1400" height="130" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="128" rx="16" fill="none" stroke="#CBD5E1"/>
  <text x="30" y="30" class="mono" font-size="13" letter-spacing="3" fill="#64748B">// PRINCIPLES</text>
  <g><rect x="30" y="46" width="245" height="44" rx="22" fill="#F1F5F9" stroke="#CBD5E1"/><circle cx="52" cy="68" r="3.5" fill="#7C3AED"><animate attributeName="opacity" values="1;0.25;1" dur="2.6s" begin="0.0s" repeatCount="indefinite"/></circle><text x="68" y="73" class="mono" font-size="13.5" fill="#334155">ship small, ship often</text></g><g><rect x="287" y="46" width="289" height="44" rx="22" fill="#F1F5F9" stroke="#CBD5E1"/><circle cx="309" cy="68" r="3.5" fill="#7C3AED"><animate attributeName="opacity" values="1;0.25;1" dur="2.6s" begin="0.4s" repeatCount="indefinite"/></circle><text x="325" y="73" class="mono" font-size="13.5" fill="#334155">measure before you optimise</text></g><g><rect x="588" y="46" width="201" height="44" rx="22" fill="#F1F5F9" stroke="#CBD5E1"/><circle cx="610" cy="68" r="3.5" fill="#7C3AED"><animate attributeName="opacity" values="1;0.25;1" dur="2.6s" begin="0.8s" repeatCount="indefinite"/></circle><text x="626" y="73" class="mono" font-size="13.5" fill="#334155">readable > clever</text></g><g><rect x="801" y="46" width="271" height="44" rx="22" fill="#F1F5F9" stroke="#CBD5E1"/><circle cx="823" cy="68" r="3.5" fill="#7C3AED"><animate attributeName="opacity" values="1;0.25;1" dur="2.6s" begin="1.2000000000000002s" repeatCount="indefinite"/></circle><text x="839" y="73" class="mono" font-size="13.5" fill="#334155">automate the boring parts</text></g><g><rect x="1084" y="46" width="245" height="44" rx="22" fill="#F1F5F9" stroke="#CBD5E1"/><circle cx="1106" cy="68" r="3.5" fill="#7C3AED"><animate attributeName="opacity" values="1;0.25;1" dur="2.6s" begin="1.6s" repeatCount="indefinite"/></circle><text x="1122" y="73" class="mono" font-size="13.5" fill="#334155">own the whole pipeline</text></g>
</svg>

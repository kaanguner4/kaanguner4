<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="190" viewBox="0 0 1400 190" role="img" aria-labelledby="t d">
  <title id="t">Real GitHub activity</title>
  <desc id="d">An introduction to the contribution graph below, which is generated from Kaan Güner's public GitHub activity and refreshed daily.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F0FDFA"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#047857"/>
      <stop offset="1" stop-color="#0284C7" stop-opacity="0.18"/>
    </linearGradient>
    <clipPath id="clip"><rect width="1400" height="190" rx="18"/></clipPath>
    <style>
      .mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}
      .disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}
    </style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1400" height="190" fill="url(#bg)"/>
    <rect x="0" y="0" width="5" height="190" fill="#047857"/>
    <text x="42" y="43" class="mono" font-size="11.5" letter-spacing="3" fill="#047857">PUBLIC BUILD LOG</text>
    <text x="42" y="86" class="disp" font-size="28" fill="#0F172A">Consistency, visible.</text>
    <text x="42" y="120" class="mono" font-size="15.5" fill="#475569">The contribution graph below is generated from real GitHub activity</text>
    <text x="42" y="146" class="mono" font-size="15.5" fill="#475569">and refreshed daily, reflecting public work over time.</text>

    <rect x="900" y="30" width="450" height="130" rx="14" fill="#FFFFFF" stroke="#A7F3D0"/>
    <g class="mono" font-size="13.5">
      <text x="930" y="65" fill="#64748B">source</text>
      <text x="1050" y="65" fill="#1E293B">github.com/kaanguner4</text>
      <text x="930" y="99" fill="#64748B">refresh</text>
      <text x="1050" y="99" fill="#047857">daily workflow</text>
      <text x="930" y="133" fill="#64748B">signal</text>
      <text x="1050" y="133" fill="#1E293B">public contributions</text>
    </g>
    <circle cx="1320" cy="94" r="6" fill="#047857">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <rect x="1" y="1" width="1398" height="188" rx="18" fill="none" stroke="url(#edge)" stroke-width="1.5"/>
</svg>

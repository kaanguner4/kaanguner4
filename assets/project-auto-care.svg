<svg xmlns="http://www.w3.org/2000/svg" width="700" height="360" viewBox="0 0 700 360" role="img" aria-labelledby="t d">
  <title id="t">Auto Care Hub</title>
  <desc id="d">Vehicle service management: bookings, records and garage workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F1A"/><stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FBBF24"/><stop offset="1" stop-color="#FBBF24" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="26"/></filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#FBBF24" fill-opacity="0.18"/>
    </pattern>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>
  <rect width="700" height="360" rx="20" fill="url(#bg)"/>
  <rect width="700" height="360" rx="20" fill="url(#dots)"/>
  <circle cx="640" cy="40" r="90" fill="#FBBF24" opacity="0.30" filter="url(#soft)">
    <animate attributeName="opacity" values="0.30;0.14;0.30" dur="5s" repeatCount="indefinite"/>
  </circle>

  <g class="mono" font-size="13" letter-spacing="3">
    <rect x="34" y="30" width="132" height="28" rx="14" fill="#FBBF24" fill-opacity="0.14" stroke="#FBBF24" stroke-opacity="0.5"/>
    <text x="50" y="49" fill="#FCD34D">FULL STACK</text>
  </g>

  <text x="34" y="120" class="disp" font-size="38" fill="#F1F5F9">Auto</text>
  <text x="34" y="164" class="disp" font-size="38" fill="#F1F5F9">Care Hub</text>

  <text x="34" y="214" class="mono" font-size="16" fill="#94A3B8">Vehicle service management: bookings,</text>
  <text x="34" y="240" class="mono" font-size="16" fill="#94A3B8">records and garage workflows.</text>

  <g class="mono" font-size="14"><rect x="34" y="266" width="85" height="30" rx="8" fill="#FBBF24" fill-opacity="0.10" stroke="#FBBF24" stroke-opacity="0.35"/><text x="45" y="286" fill="#FCD34D">Node.js</text><rect x="129" y="266" width="85" height="30" rx="8" fill="#FBBF24" fill-opacity="0.10" stroke="#FBBF24" stroke-opacity="0.35"/><text x="140" y="286" fill="#FCD34D">Express</text><rect x="224" y="266" width="67" height="30" rx="8" fill="#FBBF24" fill-opacity="0.10" stroke="#FBBF24" stroke-opacity="0.35"/><text x="235" y="286" fill="#FCD34D">MySQL</text></g>

  <line x1="34" y1="322" x2="666" y2="322" stroke="#1E293B"/>
  <text x="34" y="348" class="mono" font-size="13" fill="#FCD34D">&gt; open repository</text>
  <rect x="192" y="337" width="9" height="15" fill="#FBBF24"><animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/></rect>

  <rect x="1" y="1" width="698" height="358" rx="20" fill="none" stroke="url(#edge)" stroke-width="2"/>
</svg>

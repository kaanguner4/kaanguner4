<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="104" viewBox="0 0 1400 104" role="img" aria-labelledby="t d">
  <title id="t">activity section</title>
  <desc id="d">Section header for activity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0A0E17"/><stop offset="1" stop-color="#0C1320"/></linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#34D399" stop-opacity="0"/><stop offset="0.5" stop-color="#34D399" stop-opacity="0.10"/><stop offset="1" stop-color="#34D399" stop-opacity="0"/></linearGradient>
    <clipPath id="clip"><rect width="1400" height="104" rx="16"/></clipPath>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1400" height="104" fill="url(#bg)"/>
    <rect x="-260" y="0" width="220" height="104" fill="url(#shine)" opacity="0.5"><animate attributeName="x" values="-260;1400;1400" dur="6s" repeatCount="indefinite"/></rect>
    <rect x="0" y="0" width="5" height="104" fill="#34D399"><animate attributeName="opacity" values="1;0.45;1" dur="3.5s" repeatCount="indefinite"/></rect>
    <text x="40" y="45" class="mono" font-size="13" letter-spacing="4" fill="#6EE7B7" opacity="0.8">/ 02</text>
    <text x="40" y="82" class="disp" font-size="38" fill="#E5EEF5">activity</text>
    <text x="248" y="80" class="mono" font-size="15" fill="#5A6678">commits, streaks &amp; telemetry</text>
    <circle cx="1348" cy="52" r="4.5" fill="#34D399"><animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/></circle>
  </g>
  <rect x="1" y="1" width="1398" height="102" rx="16" fill="none" stroke="#1B2537"/>
</svg>

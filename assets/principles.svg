<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="130" viewBox="0 0 1400 130" role="img" aria-labelledby="t d">
  <title id="t">Working principles</title>
  <desc id="d">The principles Kaan works by.</desc>
  <defs><style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style></defs>
  <rect width="1400" height="130" rx="18" fill="#0B0F1A"/>
  <rect x="1" y="1" width="1398" height="128" rx="18" fill="none" stroke="#1E293B"/>
  <text x="30" y="30" class="mono" font-size="13" letter-spacing="3" fill="#64748B">// PRINCIPLES</text>
  <rect x="30" y="46" width="236" height="44" rx="22" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/><text x="50" y="73" class="mono" font-size="15" fill="#C4B5FD">✦ ship small, ship often</text><rect x="282" y="46" width="282" height="44" rx="22" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/><text x="302" y="73" class="mono" font-size="15" fill="#C4B5FD">✦ measure before you optimise</text><rect x="581" y="46" width="190" height="44" rx="22" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/><text x="601" y="73" class="mono" font-size="15" fill="#C4B5FD">✦ readable > clever</text><rect x="787" y="46" width="264" height="44" rx="22" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/><text x="807" y="73" class="mono" font-size="15" fill="#C4B5FD">✦ automate the boring parts</text><rect x="1067" y="46" width="236" height="44" rx="22" fill="#A78BFA" fill-opacity="0.08" stroke="#A78BFA" stroke-opacity="0.4"/><text x="1087" y="73" class="mono" font-size="15" fill="#C4B5FD">✦ own the whole pipeline</text>
</svg>

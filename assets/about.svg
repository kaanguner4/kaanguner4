<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="t d">
  <title id="t">About Kaan Güner</title>
  <desc id="d">A terminal style card introducing Kaan: a computer engineering student focused on AI, data and backend systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0B0F1A"/><stop offset="1" stop-color="#0E1524"/></linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>
  <rect width="1400" height="360" rx="20" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="358" rx="20" fill="none" stroke="#1E293B"/>

  <circle cx="40" cy="40" r="6" fill="#F472B6"/><circle cx="60" cy="40" r="6" fill="#FBBF24"/><circle cx="80" cy="40" r="6" fill="#A3E635"/>
  <text x="108" y="46" class="mono" font-size="14" fill="#5EEAD4">kaan@github: ~ $ whoami</text>
  <line x1="20" y1="64" x2="1380" y2="64" stroke="#1E293B"/>

  <g class="mono" font-size="18">
    <text x="40" y="112"><tspan fill="#5EEAD4">name</tspan><tspan fill="#475569">    → </tspan><tspan fill="#E2E8F0">Kaan Güner</tspan></text>
    <text x="40" y="146"><tspan fill="#5EEAD4">role</tspan><tspan fill="#475569">    → </tspan><tspan fill="#E2E8F0">Computer Engineering student · AI &amp; data systems</tspan></text>
    <text x="40" y="180"><tspan fill="#5EEAD4">doing</tspan><tspan fill="#475569">   → </tspan><tspan fill="#E2E8F0">predictive systems: sensing → pipelines → models → decisions</tspan></text>
    <text x="40" y="214"><tspan fill="#5EEAD4">likes</tspan><tspan fill="#475569">   → </tspan><tspan fill="#E2E8F0">clean data, small feedback loops, systems that don't break at 3am</tspan></text>
    <text x="40" y="248"><tspan fill="#5EEAD4">fuel</tspan><tspan fill="#475569">    → </tspan><tspan fill="#E2E8F0">coffee, curiosity, and a stubborn "why did that happen?"</tspan></text>
  </g>

  <g class="mono" font-size="16">
    <text x="40" y="306" fill="#A3E635">$ status</text>
    <text x="140" y="306" fill="#94A3B8">learning in public, shipping in the open —</text>
    <rect x="588" y="292" width="10" height="18" fill="#5EEAD4" filter="url(#glow)"><animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></rect>
  </g>

  <!-- badges -->
  <g class="mono" font-size="14">
    <rect x="1120" y="96" width="240" height="34" rx="17" fill="#22D3EE" fill-opacity="0.10" stroke="#22D3EE" stroke-opacity="0.5"/>
    <text x="1140" y="118" fill="#67E8F9">🧠 always learning</text>
    <rect x="1120" y="142" width="240" height="34" rx="17" fill="#F472B6" fill-opacity="0.10" stroke="#F472B6" stroke-opacity="0.5"/>
    <text x="1140" y="164" fill="#F9A8D4">🛠️ builder mindset</text>
    <rect x="1120" y="188" width="240" height="34" rx="17" fill="#A3E635" fill-opacity="0.10" stroke="#A3E635" stroke-opacity="0.5"/>
    <text x="1140" y="210" fill="#BEF264">📊 data first</text>
  </g>
</svg>

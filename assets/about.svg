<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="330" viewBox="0 0 1400 330" role="img" aria-labelledby="t d">
  <title id="t">About Kaan Güner</title>
  <desc id="d">A terminal style card introducing Kaan: a computer engineering student focused on AI, data and backend systems.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0A0E17"/><stop offset="1" stop-color="#0C1320"/></linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#38BDF8" stop-opacity="0"/><stop offset="0.5" stop-color="#38BDF8" stop-opacity="0.06"/><stop offset="1" stop-color="#38BDF8" stop-opacity="0"/></linearGradient>
    <clipPath id="clip"><rect width="1400" height="330" rx="20"/></clipPath>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>
  <g clip-path="url(#clip)">
    <rect width="1400" height="330" fill="url(#bg)"/>
    <rect x="-320" y="0" width="280" height="330" fill="url(#shine)"><animate attributeName="x" values="-320;1400;1400" dur="7s" repeatCount="indefinite"/></rect>

    <circle cx="40" cy="40" r="6" fill="#F472B6" opacity="0.85"/><circle cx="60" cy="40" r="6" fill="#FBBF24" opacity="0.85"/><circle cx="80" cy="40" r="6" fill="#34D399" opacity="0.85"/>
    <text x="108" y="46" class="mono" font-size="14" fill="#5EEAD4">kaan@github: ~ $ whoami</text>
    <line x1="20" y1="64" x2="1380" y2="64" stroke="#1B2537"/>

    <g class="mono" font-size="18">
      <text x="40" y="108"><tspan fill="#5EEAD4">name</tspan><tspan fill="#5A6678">    → </tspan><tspan fill="#E5EEF5">Kaan Güner</tspan></text>
      <text x="40" y="142"><tspan fill="#5EEAD4">role</tspan><tspan fill="#5A6678">    → </tspan><tspan fill="#E5EEF5">Computer Engineering student · AI &amp; data systems</tspan></text>
      <text x="40" y="176"><tspan fill="#5EEAD4">doing</tspan><tspan fill="#5A6678">   → </tspan><tspan fill="#E5EEF5">predictive systems: sensing → pipelines → models → decisions</tspan></text>
      <text x="40" y="210"><tspan fill="#5EEAD4">likes</tspan><tspan fill="#5A6678">   → </tspan><tspan fill="#E5EEF5">clean data, small feedback loops, systems that don't break at 3am</tspan></text>
      <text x="40" y="244"><tspan fill="#5EEAD4">fuel</tspan><tspan fill="#5A6678">    → </tspan><tspan fill="#E5EEF5">coffee, curiosity, and a stubborn "why did that happen?"</tspan></text>
    </g>

    <g class="mono" font-size="16">
      <text x="40" y="300" fill="#34D399">$ status</text>
      <text x="140" y="300" fill="#8B98A9">learning in public, shipping in the open —</text>
      <rect x="586" y="287" width="9" height="17" rx="1" fill="#5EEAD4"><animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/></rect>
    </g>

    <g class="mono" font-size="14">
      <rect x="1122" y="92" width="238" height="34" rx="17" fill="#131C2B" stroke="#2A3A4A"/>
      <text x="1144" y="114" fill="#7DD3FC">🧠 always learning</text>
      <rect x="1122" y="138" width="238" height="34" rx="17" fill="#131C2B" stroke="#2A3A4A"/>
      <text x="1144" y="160" fill="#F9A8D4">🛠️ builder mindset</text>
      <rect x="1122" y="184" width="238" height="34" rx="17" fill="#131C2B" stroke="#2A3A4A"/>
      <text x="1144" y="206" fill="#6EE7B7">📊 data first</text>
    </g>
  </g>
  <rect x="1" y="1" width="1398" height="328" rx="20" fill="none" stroke="#1B2537"/>
</svg>

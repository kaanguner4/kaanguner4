  <line x1="64" y1="80" x2="1336" y2="80" stroke="#D7D1C6"/>

  <text x="64" y="188" class="serif" font-size="76" fill="#191815" letter-spacing="-1.8">Kaan Güner</text>
  <text x="68" y="231" class="mono" font-size="16" fill="#7D6C5D" letter-spacing="2.2">COMPUTER ENGINEERING · AI &amp; DATA SYSTEMS</text>

  <text x="66" y="297" class="sans" font-size="20" fill="#393630">
    Building reliable systems around real-world data — from signal to decision.
  </text>

  <g class="mono" font-size="12.5" fill="#746F66" letter-spacing="1.7">
    <text x="66" y="353">AI SYSTEMS</text>

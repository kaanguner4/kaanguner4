<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="t d">
  <title id="t">Kaan Güner — AI, Data and Backend Engineering</title>
  <desc id="d">A colourful neon terminal banner with a soft grid, a glowing name and a line that types itself out.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0A0E17"/><stop offset="0.55" stop-color="#0D1022"/><stop offset="1" stop-color="#0B1520"/></linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"><animate attributeName="stop-color" values="#5EEAD4;#7DD3FC;#C4B5FD;#F9A8D4;#5EEAD4" dur="12s" repeatCount="indefinite"/></stop>
      <stop offset="0.5" stop-color="#7DD3FC"><animate attributeName="stop-color" values="#7DD3FC;#C4B5FD;#F9A8D4;#5EEAD4;#7DD3FC" dur="12s" repeatCount="indefinite"/></stop>
      <stop offset="1" stop-color="#C4B5FD"><animate attributeName="stop-color" values="#C4B5FD;#F9A8D4;#5EEAD4;#7DD3FC;#C4B5FD" dur="12s" repeatCount="indefinite"/></stop>
    </linearGradient>
    <linearGradient id="ul" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4" stop-opacity="0"/><stop offset="0.5" stop-color="#7DD3FC"/><stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="topline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2DD4BF" stop-opacity="0"/><stop offset="0.5" stop-color="#38BDF8" stop-opacity="0.7"/><stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="eq" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#2DD4BF"/><stop offset="1" stop-color="#C084FC"/></linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#000" stop-opacity="0"/><stop offset="1" stop-color="#000" stop-opacity="1"/></linearGradient>
    <mask id="gridmask"><rect width="1400" height="420" fill="url(#fade)"/></mask>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="30"/></filter>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse"><path d="M60 0H0V60" fill="none" stroke="#38BDF8" stroke-opacity="0.10" stroke-width="1"/></pattern>
    <clipPath id="cl0"><rect x="82" y="224" height="30" width="630"><animate attributeName="width" values="0;0;630;630;0;0" keyTimes="0;0;0.0625;0.25;0.2504;1" dur="14.4s" repeatCount="indefinite"/></rect></clipPath><clipPath id="cl1"><rect x="82" y="224" height="30" width="0"><animate attributeName="width" values="0;0;567;567;0;0" keyTimes="0;0.25;0.3125;0.5;0.5004;1" dur="14.4s" repeatCount="indefinite"/></rect></clipPath><clipPath id="cl2"><rect x="82" y="224" height="30" width="0"><animate attributeName="width" values="0;0;529;529;0;0" keyTimes="0;0.5;0.5625;0.75;0.7504;1" dur="14.4s" repeatCount="indefinite"/></rect></clipPath><clipPath id="cl3"><rect x="82" y="224" height="30" width="0"><animate attributeName="width" values="0;0;403;403" keyTimes="0;0.75;0.8125;1" dur="14.4s" repeatCount="indefinite"/></rect></clipPath>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>

  <rect width="1400" height="420" rx="22" fill="url(#bg)"/>
  <g mask="url(#gridmask)"><rect y="150" width="1400" height="270" fill="url(#grid)"><animateTransform attributeName="transform" type="translate" values="0 0;0 60" dur="6s" repeatCount="indefinite"/></rect></g>

  <circle cx="1170" cy="120" r="160" fill="#38BDF8" opacity="0.16" filter="url(#soft)"><animate attributeName="cy" values="120;165;120" dur="12s" repeatCount="indefinite"/></circle>
  <circle cx="1290" cy="300" r="120" fill="#C084FC" opacity="0.14" filter="url(#soft)"><animate attributeName="cx" values="1290;1225;1290" dur="14s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="350" r="130" fill="#F472B6" opacity="0.10" filter="url(#soft)"><animate attributeName="r" values="130;160;130" dur="10s" repeatCount="indefinite"/></circle>

  <g class="mono" font-size="15" letter-spacing="3">
    <circle cx="60" cy="50" r="6" fill="#F472B6"/><circle cx="80" cy="50" r="6" fill="#FBBF24"/><circle cx="100" cy="50" r="6" fill="#34D399"/>
    <text x="128" y="56" fill="#5EEAD4">~/kaanguner4 — <tspan fill="#C084FC">profile</tspan></text>
    <text x="1340" y="56" text-anchor="end" fill="#5A6678">TR // UTC+3</text>
  </g>
  <line x1="56" y1="76" x2="1344" y2="76" stroke="url(#topline)"/>

  <g filter="url(#glow)"><text x="56" y="196" class="disp" font-size="88" fill="url(#neon)" letter-spacing="1">KAAN GÜNER</text></g>
  <rect x="58" y="210" width="470" height="3" rx="1.5" fill="url(#ul)">
    <animate attributeName="width" values="0;470;470" keyTimes="0;0.3;1" dur="12s" repeatCount="indefinite"/>
  </rect>

  <text x="58" y="247" class="mono" font-size="21" fill="#5EEAD4">&gt;</text>
  <text x="82" y="247" class="mono" font-size="21" fill="#5EEAD4" clip-path="url(#cl0)">building predictive systems that survive real data</text><text x="82" y="247" class="mono" font-size="21" fill="#7DD3FC" clip-path="url(#cl1)">turning raw sensor noise into clear decisions</text><text x="82" y="247" class="mono" font-size="21" fill="#C4B5FD" clip-path="url(#cl2)">shipping models that hold up in production</text><text x="82" y="247" class="mono" font-size="21" fill="#F9A8D4" clip-path="url(#cl3)">always learning, always building</text>
  <rect x="82" y="228" width="11" height="24" rx="1" fill="#5EEAD4">
    <animate attributeName="x" values="82;712;712;82;649;649;82;611.2;611.2;82;485.2;485.2" keyTimes="0;0.0625;0.25;0.2501;0.3125;0.5;0.5001;0.5625;0.75;0.7501;0.8125;1" dur="14.4s" repeatCount="indefinite"/>
    <animate attributeName="fill" calcMode="discrete" values="#5EEAD4;#7DD3FC;#C4B5FD;#F9A8D4" keyTimes="0;0.25;0.5;0.75" dur="14.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="1.05s" repeatCount="indefinite"/>
  </rect>

  <g class="mono" font-size="15" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.2s" fill="freeze"/>
    <rect x="56" y="290" width="212" height="40" rx="20" fill="#38BDF8" fill-opacity="0.10" stroke="#38BDF8" stroke-opacity="0.4"/><text x="80" y="316" fill="#7DD3FC">◆ Computer Engineering</text>
    <rect x="284" y="290" width="190" height="40" rx="20" fill="#A78BFA" fill-opacity="0.10" stroke="#A78BFA" stroke-opacity="0.4"/><text x="308" y="316" fill="#C4B5FD">◆ AI &amp; Data Systems</text>
    <rect x="490" y="290" width="176" height="40" rx="20" fill="#F472B6" fill-opacity="0.10" stroke="#F472B6" stroke-opacity="0.4"/><text x="514" y="316" fill="#F9A8D4">◆ Backend / APIs</text>
    <rect x="682" y="290" width="158" height="40" rx="20" fill="#34D399" fill-opacity="0.10" stroke="#34D399" stroke-opacity="0.4"/>
    <circle cx="706" cy="310" r="5" fill="#34D399"><animate attributeName="opacity" values="1;0.25;1" dur="2.2s" repeatCount="indefinite"/></circle><text x="720" y="316" fill="#6EE7B7">open to work</text>
  </g>

  <g transform="translate(1066,306)" opacity="0.8"><g fill="url(#eq)">
    <rect x="0" y="-10" width="9" height="10" rx="3"><animate attributeName="height" values="10;46;18;36;10" dur="3.4s" repeatCount="indefinite"/><animate attributeName="y" values="-10;-46;-18;-36;-10" dur="3.4s" repeatCount="indefinite"/></rect>
    <rect x="18" y="-10" width="9" height="10" rx="3"><animate attributeName="height" values="10;28;52;20;10" dur="4.1s" repeatCount="indefinite"/><animate attributeName="y" values="-10;-28;-52;-20;-10" dur="4.1s" repeatCount="indefinite"/></rect>
    <rect x="36" y="-10" width="9" height="10" rx="3"><animate attributeName="height" values="10;40;14;50;10" dur="3.8s" repeatCount="indefinite"/><animate attributeName="y" values="-10;-40;-14;-50;-10" dur="3.8s" repeatCount="indefinite"/></rect>
    <rect x="54" y="-10" width="9" height="10" rx="3"><animate attributeName="height" values="10;22;44;28;10" dur="4.4s" repeatCount="indefinite"/><animate attributeName="y" values="-10;-22;-44;-28;-10" dur="4.4s" repeatCount="indefinite"/></rect>
    <rect x="72" y="-10" width="9" height="10" rx="3"><animate attributeName="height" values="10;50;24;38;10" dur="3.6s" repeatCount="indefinite"/><animate attributeName="y" values="-10;-50;-24;-38;-10" dur="3.6s" repeatCount="indefinite"/></rect>
    <rect x="90" y="-10" width="9" height="10" rx="3"><animate attributeName="height" values="10;32;54;16;10" dur="4.6s" repeatCount="indefinite"/><animate attributeName="y" values="-10;-32;-54;-16;-10" dur="4.6s" repeatCount="indefinite"/></rect>
  </g></g>

  <rect x="1" y="1" width="1398" height="418" rx="22" fill="none" stroke="#1B2537"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbfbfa"/>
      <stop offset="100%" stop-color="#f2f1ee"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000" flood-opacity=".14"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <clipPath id="nameClip"><rect x="70" y="165" width="760" height="105" rx="6"/></clipPath>
  </defs>

  <rect width="1400" height="520" rx="28" fill="url(#paper)"/>
  <rect x="1" y="1" width="1398" height="518" rx="27" fill="none" stroke="#d8d7d2"/>

  <g font-family="SFMono-Regular,Consolas,monospace" fill="#111">
    <text x="72" y="72" font-size="18" letter-spacing="4">&gt;_ AI ENGINEER</text>
    <text x="72" y="140" font-size="24" letter-spacing="3">HELLO, I'M</text>
  </g>

  <g clip-path="url(#nameClip)" font-family="SFMono-Regular,Consolas,monospace" font-size="76" font-weight="700" letter-spacing="18" fill="#111">
    <text x="72" y="245">KAAN GÜNER</text>
    <text x="72" y="245" opacity="0" filter="url(#blur)">XQ8N 6ÜZ3R
      <animate attributeName="opacity" values="1;0" dur="1.6s" begin="0s" fill="freeze"/>
    </text>
    <text x="72" y="245" opacity="0">KAAN GÜNER
      <animate attributeName="opacity" values="0;1" dur="1.2s" begin=".9s" fill="freeze"/>
    </text>
  </g>

  <line x1="74" y1="282" x2="124" y2="282" stroke="#111" stroke-width="2"/>
  <g font-family="SFMono-Regular,Consolas,monospace" fill="#222" letter-spacing="3">
    <text x="72" y="330" font-size="21">I BUILD INTELLIGENT SYSTEMS THAT</text>
    <text x="72" y="365" font-size="21">TURN DATA INTO DECISIONS AND IDEAS INTO IMPACT.</text>
  </g>

  <g transform="translate(72 410)" font-family="SFMono-Regular,Consolas,monospace" fill="#111">
    <text x="0" y="0" font-size="28">&lt;/&gt;</text>
    <text x="0" y="34" font-size="14" letter-spacing="2">CODE WITH PURPOSE</text>
    <line x1="215" y1="-14" x2="215" y2="46" stroke="#c9c7c2"/>
    <text x="255" y="0" font-size="28">◈</text>
    <text x="255" y="34" font-size="14" letter-spacing="2">SOLVE REAL PROBLEMS</text>
    <line x1="530" y1="-14" x2="530" y2="46" stroke="#c9c7c2"/>
    <text x="570" y="0" font-size="28">↗</text>
    <text x="570" y="34" font-size="14" letter-spacing="2">CREATE LASTING IMPACT</text>
  </g>

  <g transform="translate(910 78)" filter="url(#shadow)">
    <polygon points="120,180 290,120 400,220 260,330 95,300" fill="#151515"/>
    <polygon points="120,180 260,330 95,300" fill="#202020"/>
    <polygon points="290,120 400,220 260,330" fill="#0d0d0d"/>
    <polygon points="165,212 295,175 348,220 230,260" fill="#3a3a3a" opacity=".72"/>
    <g fill="none" stroke="#666" stroke-width="2" opacity=".5">
      <line x1="190" y1="220" x2="322" y2="190"/>
      <line x1="205" y1="238" x2="336" y2="208"/>
      <line x1="220" y1="255" x2="350" y2="224"/>
    </g>
  </g>

  <g transform="translate(1080 32)" filter="url(#shadow)">
    <g fill="#111">
      <polygon points="100,18 142,48 118,84 80,58"/>
      <polygon points="142,48 170,86 128,102 118,84" fill="#1d1d1d"/>
      <polygon points="80,58 118,84 92,116 55,88" fill="#252525"/>
      <polygon points="92,116 128,102 150,130 103,145"/>
      <polygon points="55,88 92,116 63,137 30,110" fill="#181818"/>
      <rect x="97" y="140" width="9" height="164" rx="4"/>
      <polygon points="103,212 160,180 178,214 111,241"/>
      <polygon points="99,246 50,218 31,252 92,276" fill="#1e1e1e"/>
    </g>
  </g>

  <g transform="translate(950 42)" filter="url(#shadow)" fill="#111">
    <polygon points="0,55 70,20 54,84"/>
    <polygon points="70,20 116,58 54,84" fill="#242424"/>
    <polygon points="54,84 116,58 88,112"/>
    <polygon points="54,84 88,112 20,102" fill="#1a1a1a"/>
  </g>

  <g fill="#111">
    <circle cx="1314" cy="54" r="3"/><circle cx="1334" cy="54" r="3"/><circle cx="1354" cy="54" r="3"/>
    <circle cx="1314" cy="74" r="3"/><circle cx="1334" cy="74" r="3"/><circle cx="1354" cy="74" r="3"/>
  </g>

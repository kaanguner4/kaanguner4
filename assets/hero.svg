    <text x="210" y="353">DATA ENGINEERING</text>
    <circle cx="381" cy="349" r="2" fill="#7D6C5D"/>
    <text x="401" y="353">BACKEND</text>
  </g>

  <line x1="925" y1="112" x2="925" y2="350" stroke="#D7D1C6"/>

  <g transform="translate(1018 119)">
    <polygon points="0,105 110,0 219,105 110,211" fill="#7D6C5D" opacity="0.08"/>
    <polygon points="0,105 110,0 110,105" fill="#7D6C5D" opacity="0.16"/>

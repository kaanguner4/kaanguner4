  <title id="title">Kaan Güner — AI Engineer</title>
  <desc id="desc">Minimal monochrome portfolio hero with animated name and black origami objects.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBFAF7"/>
      <stop offset="100%" stop-color="#F7F5F1"/>
    </linearGradient>
    <linearGradient id="blackPaper" x1="0" y1="0" x2="1" y2="1">

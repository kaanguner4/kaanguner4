<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="460" viewBox="0 0 1400 460" role="img" aria-labelledby="t d">
  <title id="t">Kaan Güner — Computer Engineering student focused on AI, data and backend systems</title>
  <desc id="d">A recruiter-focused introduction explaining that Kaan turns real-world data into working software, from machine-learning pipelines to APIs and database-backed applications.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080D17"/>
      <stop offset="0.52" stop-color="#0C1020"/>
      <stop offset="1" stop-color="#0A1720"/>
    </linearGradient>
    <linearGradient id="name" x1="56" y1="0" x2="780" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="0.52" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#C4B5FD"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#A78BFA" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#38BDF8" stroke-opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="42"/></filter>
    <clipPath id="clip"><rect width="1400" height="460" rx="22"/></clipPath>
    <style>
      .mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}
      .disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}
    </style>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1400" height="460" fill="url(#bg)"/>
    <rect width="1400" height="460" fill="url(#grid)"/>
    <circle cx="1160" cy="60" r="210" fill="#38BDF8" opacity="0.10" filter="url(#soft)">
      <animate attributeName="opacity" values="0.10;0.06;0.10" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1300" cy="420" r="170" fill="#A78BFA" opacity="0.09" filter="url(#soft)">
      <animate attributeName="r" values="170;195;170" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="430" r="120" fill="#34D399" opacity="0.07" filter="url(#soft)"/>

    <g class="mono" font-size="14" letter-spacing="2">
      <circle cx="58" cy="46" r="6" fill="#F472B6"/>
      <circle cx="78" cy="46" r="6" fill="#FBBF24"/>
      <circle cx="98" cy="46" r="6" fill="#34D399"/>
      <text x="126" y="51" fill="#7DD3FC">~/kaanguner4/<tspan fill="#C4B5FD">profile</tspan></text>
      <text x="1342" y="51" text-anchor="end" fill="#64748B">TÜRKİYE · UTC+3</text>
    </g>
    <line x1="56" y1="72" x2="1344" y2="72" stroke="#1E293B"/>

    <text x="58" y="114" class="mono" font-size="14" letter-spacing="3" fill="#5EEAD4">COMPUTER ENGINEERING · AI / DATA / BACKEND</text>
    <text x="54" y="184" class="disp" font-size="72" letter-spacing="1" fill="url(#name)" filter="url(#glow)">Kaan Güner</text>

    <text x="58" y="236" class="disp" font-size="31" fill="#EEF4FA">I turn real-world data into</text>
    <text x="58" y="275" class="disp" font-size="31" fill="#7DD3FC">working software.</text>
    <text x="58" y="316" class="mono" font-size="17" fill="#94A3B8">From feature pipelines and ML models to APIs</text>
    <text x="58" y="342" class="mono" font-size="17" fill="#94A3B8">and database-backed applications.</text>

    <g class="mono" font-size="13.5">
      <rect x="58" y="370" width="148" height="34" rx="17" fill="#10212A" stroke="#2DD4BF" stroke-opacity="0.45"/>
      <circle cx="78" cy="387" r="4" fill="#5EEAD4"/>
      <text x="94" y="392" fill="#B7F7EE">Applied ML</text>
      <rect x="220" y="370" width="170" height="34" rx="17" fill="#111D2B" stroke="#38BDF8" stroke-opacity="0.45"/>
      <circle cx="240" cy="387" r="4" fill="#7DD3FC"/>
      <text x="256" y="392" fill="#C6EAFF">Data systems</text>
      <rect x="404" y="370" width="196" height="34" rx="17" fill="#18182B" stroke="#A78BFA" stroke-opacity="0.45"/>
      <circle cx="424" cy="387" r="4" fill="#C4B5FD"/>
      <text x="440" y="392" fill="#E1D9FF">Backend / APIs</text>
    </g>

    <g transform="translate(914,92)">
      <rect width="430" height="318" rx="18" fill="#0B111D" fill-opacity="0.92" stroke="url(#edge)"/>
      <text x="28" y="40" class="mono" font-size="12" letter-spacing="3" fill="#64748B">HOW I BUILD</text>
      <text x="402" y="40" text-anchor="end" class="mono" font-size="11" fill="#34D399">END TO END</text>
      <line x1="28" y1="57" x2="402" y2="57" stroke="#1E293B"/>

      <line x1="52" y1="91" x2="52" y2="239" stroke="url(#flow)" stroke-width="2" stroke-dasharray="5 7">
        <animate attributeName="stroke-dashoffset" values="24;0" dur="3s" repeatCount="indefinite"/>
      </line>

      <g class="mono">
        <rect x="28" y="72" width="374" height="45" rx="10" fill="#0F1926" stroke="#1E3A4A"/>
        <circle cx="52" cy="94.5" r="8" fill="#0B111D" stroke="#5EEAD4" stroke-width="2"/>
        <text x="76" y="91" font-size="11" letter-spacing="2" fill="#5EEAD4">01 · INPUT</text>
        <text x="76" y="107" font-size="13" fill="#D5DDE6">sensor, listing or application data</text>

        <rect x="28" y="126" width="374" height="45" rx="10" fill="#0F1926" stroke="#1E3A4A"/>
        <circle cx="52" cy="148.5" r="8" fill="#0B111D" stroke="#7DD3FC" stroke-width="2"/>
        <text x="76" y="145" font-size="11" letter-spacing="2" fill="#7DD3FC">02 · PIPELINE</text>
        <text x="76" y="161" font-size="13" fill="#D5DDE6">clean, validate, engineer features</text>

        <rect x="28" y="180" width="374" height="45" rx="10" fill="#0F1926" stroke="#2F2A4D"/>
        <circle cx="52" cy="202.5" r="8" fill="#0B111D" stroke="#C4B5FD" stroke-width="2"/>
        <text x="76" y="199" font-size="11" letter-spacing="2" fill="#C4B5FD">03 · MODEL / LOGIC</text>
        <text x="76" y="215" font-size="13" fill="#D5DDE6">evaluate models and make decisions</text>

        <rect x="28" y="234" width="374" height="45" rx="10" fill="#0F1926" stroke="#2D4141"/>
        <circle cx="52" cy="256.5" r="8" fill="#0B111D" stroke="#6EE7B7" stroke-width="2"/>
        <text x="76" y="253" font-size="11" letter-spacing="2" fill="#6EE7B7">04 · PRODUCT</text>
        <text x="76" y="269" font-size="13" fill="#D5DDE6">API, dashboard, alert, or app</text>
      </g>
      <rect x="28" y="290" width="205" height="20" rx="10" fill="#34D399" fill-opacity="0.10" stroke="#34D399" stroke-opacity="0.30"/>
      <circle cx="42" cy="300" r="3.5" fill="#34D399">
        <animate attributeName="opacity" values="1;0.35;1" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <text x="52" y="304" class="mono" font-size="10.5" letter-spacing="1.2" fill="#9DEBCB">OPEN TO OPPORTUNITIES</text>
    </g>

    <text x="58" y="437" class="mono" font-size="13" letter-spacing="2" fill="#64748B">SELECTED WORK BELOW ↓</text>
    <rect x="0" y="454" width="1400" height="6" fill="url(#edge)"/>
  </g>
  <rect x="1" y="1" width="1398" height="458" rx="22" fill="none" stroke="url(#edge)" stroke-width="1.5"/>
</svg>

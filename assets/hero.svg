<svg xmlns="http://www.w3.org/2000/svg" width="800" height="228.571" viewBox="0 0 1400 400" role="img" aria-labelledby="title desc">
  <title id="title">Kaan Güner — Computer Engineering, AI and Data Systems</title>
  <desc id="desc">A restrained editorial profile header in warm neutral tones.</desc>
  <defs>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8F6F1"/>
      <stop offset="1" stop-color="#F1EDE5"/>
    </linearGradient>
    <style>
      .serif { font-family: Georgia, "Times New Roman", serif; }
      .mono { font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", monospace; }
      .sans { font-family: Inter, "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect x="1" y="1" width="1398" height="398" rx="22" fill="url(#canvas)" stroke="#D7D1C6"/>

  <g class="mono" font-size="13" letter-spacing="2.1">

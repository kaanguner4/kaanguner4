<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="430" viewBox="0 0 1400 430">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070D"/>
      <stop offset="45%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#11162A"/>
    </linearGradient>

    <radialGradient id="glowCyan">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowViolet">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="titleGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="48%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="30%" stop-color="#8B5CF6"/>
      <stop offset="70%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M 46 0 L 0 0 0 46" fill="none" stroke="#94A3B8" stroke-opacity=".055" stroke-width="1"/>
    </pattern>

    <clipPath id="clip-0"><rect x="190" y="111" width="110" height="118" rx="12"/></clipPath><clipPath id="clip-1"><rect x="298" y="111" width="110" height="118" rx="12"/></clipPath><clipPath id="clip-2"><rect x="406" y="111" width="110" height="118" rx="12"/></clipPath><clipPath id="clip-3"><rect x="514" y="111" width="110" height="118" rx="12"/></clipPath><clipPath id="clip-5"><rect x="730" y="111" width="110" height="118" rx="12"/></clipPath><clipPath id="clip-6"><rect x="838" y="111" width="110" height="118" rx="12"/></clipPath><clipPath id="clip-7"><rect x="946" y="111" width="110" height="118" rx="12"/></clipPath><clipPath id="clip-8"><rect x="1054" y="111" width="110" height="118" rx="12"/></clipPath><clipPath id="clip-9"><rect x="1162" y="111" width="110" height="118" rx="12"/></clipPath>
  </defs>

  <style>
    .hero-letter {
      font-family: "SFMono-Regular", "Cascadia Code", "JetBrains Mono", monospace;
      font-size: 96px;
      font-weight: 800;
      fill: url(#titleGradient);
      letter-spacing: 2px;
      filter: url(#softGlow);
    }

    .eyebrow {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 7px;
      fill: #94A3B8;
    }

    .subtitle {
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      font-size: 27px;
      font-weight: 600;
      letter-spacing: 1.4px;
      fill: #CBD5E1;
    }

    .micro {
      font-family: "SFMono-Regular", "Cascadia Code", monospace;
      font-size: 16px;
      font-weight: 600;
      fill: #67E8F9;
      letter-spacing: 1.2px;
    }
  </style>

  <rect width="1400" height="430" rx="34" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="428" rx="33" fill="none" stroke="#64748B" stroke-opacity=".28"/>
  <rect width="1400" height="430" rx="34" fill="url(#grid)"/>

  <circle cx="1160" cy="80" r="280" fill="url(#glowCyan)">
    <animate attributeName="cx" values="1160;1080;1160" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="370" r="300" fill="url(#glowViolet)">
    <animate attributeName="cy" values="370;300;370" dur="9s" repeatCount="indefinite"/>
  </circle>

  <g opacity=".5">
    <circle cx="124" cy="92" r="3" fill="#67E8F9">
      <animate attributeName="opacity" values=".2;1;.2" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1310" cy="324" r="2.6" fill="#C4B5FD">

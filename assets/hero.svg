    </filter>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <style>
      .mono { font-family: "SFMono-Regular","Cascadia Code","JetBrains Mono",monospace; }
      .sans { font-family: Inter,Segoe UI,Arial,sans-serif; }
      .name-char { font-family: "SFMono-Regular","Cascadia Code","JetBrains Mono",monospace; font-size: 78px; font-weight: 700; fill: #111111; text-anchor: middle; }
      .micro { font-family: "SFMono-Regular","Cascadia Code","JetBrains Mono",monospace; fill: #111111; letter-spacing: 3px; }
    </style>
  </defs>


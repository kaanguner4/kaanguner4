    <circle cx="1185" cy="360" r="2" fill="#F8FAFC">
      <animate attributeName="opacity" values=".15;.9;.15" dur="2.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="700" y="72" class="eyebrow" text-anchor="middle">AI ENGINEERING • DATA SYSTEMS • INDUSTRIAL INTELLIGENCE</text>

  

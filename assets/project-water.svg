<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="240" viewBox="0 0 1400 240" role="img" aria-labelledby="t d">
  <title id="t">Industrial Water Anomaly Detection — currently active flagship project</title>
  <desc id="d">The project I am actively building, shown as a live monitor banner with an activity graph.</desc>
  <defs>

<svg xmlns="http://www.w3.org/2000/svg" width="700" height="360" viewBox="0 0 700 360" role="img" aria-labelledby="t d">
  <title id="t">Industrial Water Anomaly Detection</title>
  <desc id="d">Sensor telemetry to alerts: ingestion, feature pipeline, model, decision layer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0F1A"/><stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="26"/></filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#22D3EE" fill-opacity="0.18"/>
    </pattern>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>
  <rect width="700" height="360" rx="20" fill="url(#bg)"/>
  <rect width="700" height="360" rx="20" fill="url(#dots)"/>
  <circle cx="640" cy="40" r="90" fill="#22D3EE" opacity="0.30" filter="url(#soft)">
    <animate attributeName="opacity" values="0.30;0.14;0.30" dur="5s" repeatCount="indefinite"/>
  </circle>

  <g class="mono" font-size="13" letter-spacing="3">
    <rect x="34" y="30" width="112" height="28" rx="14" fill="#22D3EE" fill-opacity="0.14" stroke="#22D3EE" stroke-opacity="0.5"/>
    <text x="50" y="49" fill="#5EEAD4">FLAGSHIP</text>
  </g>

  <text x="34" y="120" class="disp" font-size="38" fill="#F1F5F9">Industrial Water</text>
  <text x="34" y="164" class="disp" font-size="38" fill="#F1F5F9">Anomaly Detection</text>

  <text x="34" y="214" class="mono" font-size="16" fill="#94A3B8">Sensor telemetry to alerts: ingestion,</text>
  <text x="34" y="240" class="mono" font-size="16" fill="#94A3B8">feature pipeline, model, decision layer.</text>

  <g class="mono" font-size="14"><rect x="34" y="266" width="76" height="30" rx="8" fill="#22D3EE" fill-opacity="0.10" stroke="#22D3EE" stroke-opacity="0.35"/><text x="45" y="286" fill="#5EEAD4">Python</text><rect x="120" y="266" width="103" height="30" rx="8" fill="#22D3EE" fill-opacity="0.10" stroke="#22D3EE" stroke-opacity="0.35"/><text x="131" y="286" fill="#5EEAD4">Pipelines</text><rect x="233" y="266" width="112" height="30" rx="8" fill="#22D3EE" fill-opacity="0.10" stroke="#22D3EE" stroke-opacity="0.35"/><text x="244" y="286" fill="#5EEAD4">Anomaly ML</text></g>

  <line x1="34" y1="322" x2="666" y2="322" stroke="#1E293B"/>
  <text x="34" y="348" class="mono" font-size="13" fill="#5EEAD4">&gt; open repository</text>
  <rect x="192" y="337" width="9" height="15" fill="#22D3EE"><animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/></rect>

  <rect x="1" y="1" width="698" height="358" rx="20" fill="none" stroke="url(#edge)" stroke-width="2"/>
</svg>

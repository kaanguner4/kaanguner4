<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="150" viewBox="0 0 1400 150" role="img" aria-labelledby="t d">
  <title id="t">Footer</title>
  <desc id="d">Closing banner with a thank you note.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0A0E1A"/><stop offset="1" stop-color="#121026"/></linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/><stop offset="0.5" stop-color="#A78BFA"/><stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.mono{font-family:"SFMono-Regular","Cascadia Code","JetBrains Mono",ui-monospace,monospace}.disp{font-family:"Trebuchet MS",Verdana,Inter,"Segoe UI",Arial,sans-serif;font-weight:700}</style>
  </defs>
  <rect width="1400" height="150" rx="18" fill="url(#bg)"/>
  <rect x="1" y="1" width="1398" height="148" rx="18" fill="none" stroke="#1E293B"/>
  <text x="700" y="70" text-anchor="middle" class="disp" font-size="34" fill="url(#neon)" filter="url(#glow)">thanks for scrolling this far ✦</text>
  <text x="700" y="106" text-anchor="middle" class="mono" font-size="16" fill="#64748B">built with SVG, caffeine and too many gradients — Kaan Güner</text>
  <g>
    <circle cx="640" cy="126" r="4" fill="#22D3EE"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="126" r="4" fill="#A78BFA"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="126" r="4" fill="#F472B6"><animate attributeName="opacity" values="1;0.2;1" dur="1.6s" begin="0.5s" repeatCount="indefinite"/></circle>
  </g>
</svg>

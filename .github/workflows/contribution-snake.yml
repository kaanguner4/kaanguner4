name: Generate contribution animation

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate animated contribution grids
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#C084FC&color_dots=#0C1320,#2A1B45,#5B2A9E,#8B3FE0,#C084FC
            dist/github-contribution-grid-snake-dark.svg?color_snake=#C084FC&color_dots=#0C1320,#2A1B45,#5B2A9E,#8B3FE0,#C084FC
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish animation to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true

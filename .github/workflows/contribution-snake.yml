name: Generate contribution animation

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Generate animated contribution grids
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#22D3EE&color_dots=#0B0F1A,#1E5245,#2E8B6F,#43C59E,#5EEAD4
            dist/github-contribution-grid-snake-dark.svg?color_snake=#F472B6&color_dots=#0B0F1A,#3A2540,#7A2E6B,#C93FA0,#F472B6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish animation to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: ./dist
          force_orphan: true
